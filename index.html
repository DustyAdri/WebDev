<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Construction Material Estimator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0ece4;
      --panel: #ffffff;
      --border: #d4c9b8;
      --accent: #c0392b;
      --accent2: #2c3e50;
      --text: #1a1a1a;
      --muted: #888;
      --safe: #27ae60;
      --danger: #c0392b;
      --shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    body {
      font-family: Georgia, 'Times New Roman', serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 20px;
    }

    h1 {
      text-align: center;
      font-size: 1.6rem;
      letter-spacing: 1px;
      margin-bottom: 6px;
      color: var(--accent2);
    }

    .subtitle {
      text-align: center;
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 24px;
      font-style: italic;
    }

    .app {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      max-width: 900px;
      margin: 0 auto;
    }

    @media (max-width: 640px) {
      .app { grid-template-columns: 1fr; }
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-header {
      background: var(--accent2);
      color: #fff;
      padding: 10px 16px;
      font-size: 0.95rem;
      font-weight: bold;
      letter-spacing: 0.5px;
    }

    .panel-body {
      padding: 12px;
      min-height: 200px;
    }

    /* Material items */
    .material-item, .load-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 10px;
      margin-bottom: 8px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: #fafaf8;
      font-size: 0.88rem;
    }

    .item-info { flex: 1; }
    .item-name { font-weight: bold; color: var(--accent2); }
    .item-weight { color: var(--muted); font-size: 0.82rem; }

    .btn {
      border: none;
      border-radius: 3px;
      padding: 5px 12px;
      cursor: pointer;
      font-size: 0.82rem;
      font-family: inherit;
      font-weight: bold;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.8; }

    .btn-add {
      background: var(--accent2);
      color: #fff;
    }

    .btn-remove {
      background: var(--accent);
      color: #fff;
    }

    /* Bottom controls */
    .controls {
      max-width: 900px;
      margin: 20px auto 0;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      box-shadow: var(--shadow);
      padding: 16px;
    }

    .controls-row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .controls label {
      font-size: 0.88rem;
      font-weight: bold;
      color: var(--accent2);
    }

    .controls input[type="number"] {
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 6px 10px;
      font-size: 0.88rem;
      font-family: inherit;
      width: 120px;
    }

    .total-field {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }

    .total-field input[disabled] {
      background: #f5f2ec;
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 6px 10px;
      font-size: 0.88rem;
      font-family: inherit;
      width: 120px;
      color: var(--accent2);
      font-weight: bold;
    }

    .btn-confirm {
      background: var(--accent2);
      color: #fff;
      padding: 7px 18px;
      font-size: 0.9rem;
    }

    #status-msg {
      margin-top: 12px;
      font-size: 1rem;
      font-weight: bold;
      text-align: center;
      padding: 8px;
      border-radius: 4px;
      display: none;
    }

    .msg-safe {
      background: #eafaf1;
      color: var(--safe);
      border: 1px solid #a9dfbf;
    }

    .msg-danger {
      background: #fdf0ed;
      color: var(--danger);
      border: 1px solid #f5b7b1;
    }

    .empty-msg {
      color: var(--muted);
      font-style: italic;
      font-size: 0.85rem;
      text-align: center;
      padding: 20px 0;
    }
  </style>
</head>
<body>

  <h1>Construction Material Estimator</h1>
  <p class="subtitle">Warehouse &amp; Truck Load Manager</p>

  <div class="app">
    <!-- Warehouse Inventory -->
    <div class="panel">
      <div class="panel-header">📦 Warehouse Inventory</div>
      <div class="panel-body" id="warehouse-list"></div>
    </div>

    <!-- Truck Load -->
    <div class="panel">
      <div class="panel-header">🚛 Truck Load</div>
      <div class="panel-body" id="truck-list"></div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <div class="total-field">
      <label for="total-weight">Total Weight:</label>
      <input type="number" id="total-weight" disabled value="0" /> kg
    </div>
    <div class="controls-row">
      <label for="max-capacity">Maximum Capacity (kg):</label>
      <input type="number" id="max-capacity" placeholder="e.g. 500" min="0" />
      <button class="btn btn-confirm" onclick="confirmLoad()">Confirm Load</button>
    </div>
    <div id="status-msg"></div>
  </div>

  <script>
    // Material catalog data
    const catalog = [
      { id: 1, name: "Steel Beam",       weight: 120 },
      { id: 2, name: "Concrete Block",   weight: 85  },
      { id: 3, name: "Lumber (8ft)",     weight: 30  },
      { id: 4, name: "Gravel Bag",       weight: 50  },
      { id: 5, name: "Cement Bag",       weight: 40  },
      { id: 6, name: "Rebar Bundle",     weight: 95  },
      { id: 7, name: "Sand Bag",         weight: 45  },
      { id: 8, name: "Roofing Sheet",    weight: 25  }
    ];

    // State: track which items are in warehouse vs truck
    let warehouse = [...catalog]; // all start in warehouse
    let truck = [];
    let totalWeight = 0;

    function renderWarehouse() {
      const el = document.getElementById('warehouse-list');
      if (warehouse.length === 0) {
        el.innerHTML = '<p class="empty-msg">No items in warehouse.</p>';
        return;
      }
      
      el.innerHTML = '';
      warehouse.forEach(item => {
        const div = document.createElement('div');
        div.className = 'material-item';
        div.innerHTML = `
          <div class="item-info">
            <div class="item-name">${item.name}</div>
            <div class="item-weight">${item.weight} kg</div>
          </div>
          <button class="btn btn-add" onclick="addToTruck(${item.id})">Add</button>
        `;
        el.appendChild(div);
      });
    }

    function renderTruck() {
      const el = document.getElementById('truck-list');
      if (truck.length === 0) {
        el.innerHTML = '<p class="empty-msg">Truck is empty.</p>';
        return;
      }
      el.innerHTML = '';
      truck.forEach(item => {
        const div = document.createElement('div');
        div.className = 'load-item';
        div.innerHTML = `
          <div class="item-info">
            <div class="item-name">${item.name}</div>
            <div class="item-weight">${item.weight} kg</div>
          </div>
          <button class="btn btn-remove" onclick="removeFromTruck(${item.id})">Remove</button>
        `;
        el.appendChild(div);
      });
    }

    function updateTotal() {
      totalWeight = truck.reduce((sum, item) => sum + item.weight, 0);
      document.getElementById('total-weight').value = totalWeight;
    }

    function addToTruck(id) {
      const idx = warehouse.findIndex(i => i.id === id);
      if (idx === -1) return;
      const item = warehouse.splice(idx, 1)[0];
      truck.push(item);
      updateTotal();
      renderWarehouse();
      renderTruck();
      hideStatus();
    }

    function removeFromTruck(id) {
      const idx = truck.findIndex(i => i.id === id);
      if (idx === -1) return;
      const item = truck.splice(idx, 1)[0];
      warehouse.push(item);
      updateTotal();
      renderWarehouse();
      renderTruck();
      hideStatus();
    }

    function confirmLoad() {
      const capacity = parseFloat(document.getElementById('max-capacity').value);
      const msg = document.getElementById('status-msg');

      if (isNaN(capacity) || capacity <= 0) {
        msg.textContent = '⚠ Please enter a valid maximum capacity.';
        msg.className = 'msg-danger';
        msg.style.display = 'block';
        return;
      }

      if (totalWeight <= capacity) {
        msg.textContent = '✔ Load Secure!';
        msg.className = 'msg-safe';
        msg.style.display = 'block';
        // Reset truck load
        warehouse = [...warehouse, ...truck];
        truck = [];
        updateTotal();
        renderWarehouse();
        renderTruck();
      } else {
        msg.textContent = '✖ Overweight Hazard!';
        msg.className = 'msg-danger';
        msg.style.display = 'block';
      }
    }

    function hideStatus() {
      const msg = document.getElementById('status-msg');
      msg.style.display = 'none';
    }

    // Initial render
    renderWarehouse();
    renderTruck();
  </script>
</body>
</html>
